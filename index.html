<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --black: #0a0a0a;
    --grey1: #333;
    --grey2: #666;
    --grey3: #999;
    --grey4: #bbb;
    --grey5: #e5e5e5;
    --grey6: #f5f5f7;
    --white: #ffffff;
    --rule: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--white);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ─── CAMERA SCREEN ─── */
  #camSection {
    min-height: 100vh;
    min-height: 100dvh;
    display: none;
    flex-direction: column;
    background: var(--white);
  }
  #camSection.active { display: flex; }

  .top-bar {
    padding: 52px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid var(--rule);
  }

  .logo {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--black);
  }
  .logo span { color: var(--gold); }

  .logo-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--grey4);
    text-transform: uppercase;
  }

  .vf-wrap {
    flex: 1;
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .vf {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background: var(--grey6);
    border: 1px solid var(--rule);
  }

  #videoEl { width: 100%; height: 100%; object-fit: cover; display: none; }
  #videoEl.on { display: block; }
  #previewEl { width: 100%; height: 100%; object-fit: cover; display: none; }
  #previewEl.on { display: block; }

  .vf-hint {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }

  .vf-hint .ico {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--white);
    border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .vf-hint .txt {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--grey4);
    text-align: center;
    line-height: 1.6;
  }

  /* Corner brackets */
  .corner { position: absolute; width: 22px; height: 22px; border-color: var(--gold); border-style: solid; opacity: 0.7; }
  .tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
  .tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
  .bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
  .br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

  /* Scan line */
  .scan { position: absolute; left: 14px; right: 14px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0.5; animation: scan 3s ease-in-out infinite; }
  @keyframes scan { 0% { top: 14px; opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { top: calc(100% - 14px); opacity: 0; } }

  .cam-controls {
    padding: 20px 28px 48px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--white); border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .icon-btn svg { width: 20px; height: 20px; opacity: 0.5; }
  .icon-btn:active { transform: scale(0.93); background: var(--grey6); }

  .shutter {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--black); border: none;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .shutter::after {
    content: '';
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--black); border: 2px solid rgba(255,255,255,0.15);
  }
  .shutter:active { transform: scale(0.93); }

  .go-btn {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--gold); border: none;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.05em; color: var(--black); text-align: center; line-height: 1.2; text-transform: uppercase;
    cursor: pointer; flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
  }
  .go-btn.on { display: flex; }
  .go-btn:active { transform: scale(0.93); }

  .retake-btn { display: none; }
  .retake-btn.on { display: flex; }

  .cam-hint {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.06em; color: var(--grey4);
    text-align: center; padding-bottom: 8px; flex-shrink: 0;
    text-transform: uppercase;
  }

  /* ─── LOADING SCREEN ─── */
  #loadSection {
    min-height: 100vh; min-height: 100dvh;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; background: var(--white);
  }
  #loadSection.active { display: flex; }

  .load-logo {
    font-size: 16px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--grey5);
  }
  .load-logo span { color: var(--gold); }

  .rings { position: relative; display: flex; align-items: center; justify-content: center; }
  .ring { width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--gold); animation: ripple 1.5s ease-out infinite; }
  .ring2 { position: absolute; width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--gold); animation: ripple 1.5s ease-out 0.6s infinite; opacity: 0.3; }
  @keyframes ripple { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.9); opacity: 0; } }

  .load-txt {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; color: var(--grey4);
    text-transform: uppercase; animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* ─── CARD SCREEN ─── */
  #cardSection {
    display: none;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    min-height: 100vh; min-height: 100dvh;
    background: var(--grey6);
    padding: 0 0 80px;
  }
  #cardSection.active { display: block; }

  /* App header on card screen */
  .card-screen-header {
    padding: 52px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .new-scan-pill {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--black);
    background: var(--white);
    border: 1px solid var(--rule);
    padding: 8px 16px; border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .new-scan-pill:active { background: var(--grey6); }

  /* ─── THE DISCOVERY CARD ─── */
  .card {
    margin: 20px 16px 0;
    border-radius: 20px;
    overflow: hidden;
    background: var(--white);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06), 0 20px 48px rgba(0,0,0,0.08);
  }

  .card-photo {
    width: 100%; height: auto;
    background: var(--grey6);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px;
  }

  .card-photo img { width: 100%; height: auto; display: block; max-height: 380px; object-fit: contain; }

  .gold-line { height: 3px; background: linear-gradient(to right, var(--gold), var(--gold-light), var(--gold)); }

  .card-body { padding: 20px 22px 0; }

  .card-kicker {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.14em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 8px;
  }

  .card-name {
    font-size: 28px; font-weight: 800;
    color: var(--black); line-height: 1.08;
    letter-spacing: -0.8px; margin-bottom: 6px;
  }

  .card-loc {
    font-size: 11px; font-weight: 400;
    color: var(--grey4); margin-bottom: 18px;
  }

  .card-rule { height: 1px; background: var(--rule); margin-bottom: 18px; }

  .card-desc {
    font-size: 15px; font-weight: 400;
    color: var(--grey1); line-height: 1.74;
    letter-spacing: -0.1px; margin-bottom: 20px;
  }

  .fact-box {
    background: var(--black);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 24px;
  }

  .fact-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.16em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 8px;
  }

  .fact-text {
    font-size: 14px; font-weight: 400;
    color: #888; line-height: 1.7; letter-spacing: -0.1px;
  }

  /* Share icons */
  .share-wrap {
    padding: 16px 22px 20px;
    border-top: 1px solid var(--rule);
  }

  .share-lbl {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--grey4);
    text-transform: uppercase; margin-bottom: 14px; text-align: center;
  }

  .share-row { display: flex; justify-content: space-between; align-items: center; }

  .sico {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; flex: 1;
    transition: transform 0.15s;
  }
  .sico:active { transform: scale(0.85); opacity: 0.7; }

  .sico-ring {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .sico-name { font-size: 7px; font-weight: 500; color: var(--grey4); text-transform: uppercase; letter-spacing: 0.04em; }
  .sico svg { width: 18px; height: 18px; }

  .ig .sico-ring { background: radial-gradient(circle at 30% 110%, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888); }
  .tk .sico-ring { background: #010101; }
  .wa .sico-ring { background: #25D366; }
  .im .sico-ring { background: linear-gradient(135deg,#29CC52,#1eaa3f); }
  .tw .sico-ring { background: #000; }
  .fb .sico-ring { background: #1877F2; }
  .sc .sico-ring { background: #FFFC00; }

  .card-footer {
    padding: 14px 22px 18px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }

  .footer-brand { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: var(--grey5); text-transform: uppercase; }
  .footer-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }

  /* ─── REPOST BUTTON ─── */
  .repost-wrap { margin: 16px 16px 0; }

  .repost-btn {
    width: 100%;
    background: var(--black); color: var(--white);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 16px; border-radius: 14px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .repost-btn:active { transform: scale(0.98); background: var(--grey1); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.on { display: flex; flex-direction: column; gap: 14px; }

  /* ─── SHARE CARD — Full Bleed Story Format ─── */
  .share-card {
    width: 100%; max-width: 340px;
    aspect-ratio: 9/16;
    border-radius: 20px; overflow: hidden;
    position: relative; background: #000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 32px 80px rgba(0,0,0,0.5);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .sc-photo { position: absolute; inset: 0; z-index: 0; }
  .sc-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

  .sc-grad-top {
    position: absolute; top: 0; left: 0; right: 0; height: 100px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
    z-index: 1;
  }

  .sc-grad-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 72%;
    background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.88) 30%, rgba(0,0,0,0.6) 55%, transparent 100%);
    z-index: 1;
  }

  .sc-corner { position: absolute; width: 16px; height: 16px; border-color: rgba(201,168,76,0.65); border-style: solid; z-index: 3; }
  .sc-tl { top: 48px; left: 14px; border-width: 2px 0 0 2px; border-radius: 2px 0 0 0; }
  .sc-tr { top: 48px; right: 14px; border-width: 2px 2px 0 0; border-radius: 0 2px 0 0; }

  .sc-logo { position: absolute; top: 16px; left: 18px; z-index: 4; font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; }
  .sc-logo span { color: #C9A84C; }

  .sc-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 18px 22px; z-index: 5; }

  .sc-kicker { font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 600; letter-spacing: 0.16em; color: #C9A84C; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 7px; }
  .sc-kicker-line { width: 14px; height: 1.5px; background: #C9A84C; border-radius: 2px; flex-shrink: 0; }

  .sc-name { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.05; letter-spacing: -0.7px; margin-bottom: 3px; text-shadow: 0 2px 16px rgba(0,0,0,0.6); }
  .sc-loc { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 11px; }

  .sc-gold-line { height: 1.5px; background: linear-gradient(to right, #C9A84C, rgba(201,168,76,0.1)); margin-bottom: 11px; }

  .sc-desc { font-size: 11px; color: rgba(255,255,255,0.68); line-height: 1.65; letter-spacing: -0.1px; margin-bottom: 10px; }

  .sc-fact-box { background: rgba(8,8,8,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(201,168,76,0.2); border-radius: 11px; padding: 10px 13px; margin-bottom: 13px; }
  .sc-fact-label { font-family: 'DM Mono', monospace; font-size: 7.5px; font-weight: 600; letter-spacing: 0.16em; color: #C9A84C; text-transform: uppercase; margin-bottom: 4px; }
  .sc-fact-text { font-size: 10.5px; color: rgba(255,255,255,0.62); line-height: 1.65; letter-spacing: -0.1px; }

  .sc-footer { display: flex; align-items: center; gap: 6px; }
  .sc-footer-brand { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.22); text-transform: uppercase; }
  .sc-footer-dot { width: 5px; height: 5px; border-radius: 50%; background: #C9A84C; }

  /* Modal actions */
  .modal-actions { display: flex; gap: 10px; width: 100%; max-width: 360px; }

  .dl-btn {
    flex: 1; background: var(--black); color: var(--white);
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px; border-radius: 12px; border: none; cursor: pointer;
  }
  .dl-btn:active { background: var(--grey1); }

  .close-btn {
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--black); color: #aaa;
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    padding: 12px 22px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 999; max-width: 88vw; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ── CAMERA ── -->
<div id="camSection" class="active">
  <div class="top-bar">
    <div class="logo">NEX<span>US</span></div>
    <div class="logo-sub">Point & Discover</div>
  </div>
  <div class="vf-wrap">
    <div class="vf">
      <video id="videoEl" autoplay playsinline muted></video>
      <img id="previewEl" alt="">
      <div class="vf-hint" id="vfHint">
        <div class="ico">📷</div>
        <div class="txt">Point at any building,<br>object or landmark</div>
      </div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan"></div>
    </div>
  </div>
  <div class="cam-controls">
    <label class="icon-btn">
      <input type="file" accept="image/*" id="fileIn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </label>
    <div class="shutter" id="shutterBtn"></div>
    <button class="go-btn" id="goBtn">Identify<br>This</button>
    <div class="icon-btn retake-btn" id="retakeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    </div>
  </div>
  <div class="cam-hint" id="camHint">Tap shutter or upload a photo</div>
</div>

<!-- ── LOADING ── -->
<div id="loadSection">
  <div class="load-logo">NEX<span>US</span></div>
  <div class="rings"><div class="ring"></div><div class="ring2"></div></div>
  <div class="load-txt">Identifying...</div>
</div>

<!-- ── CARD ── -->
<div id="cardSection">
  <div class="card-screen-header">
    <div class="logo">NEX<span style="color:var(--gold)">US</span></div>
    <button class="new-scan-pill" onclick="newScan()">⟳ New Scan</button>
  </div>

  <div class="card">
    <div class="card-photo">
      <img id="cardImg" alt="">
    </div>
    <div class="gold-line"></div>
    <div class="card-body">
      <div class="card-kicker" id="cardKicker"></div>
      <div class="card-name" id="cardName"></div>
      <div class="card-loc" id="cardLoc"></div>
      <div class="card-rule"></div>
      <div class="card-desc" id="cardDesc"></div>
      <div class="fact-box">
        <div class="fact-label">🔥 Wild Fact</div>
        <div class="fact-text" id="cardFact"></div>
      </div>
    </div>

    <div class="share-wrap">
      <div class="share-lbl">Share this find</div>
      <div class="share-row">

<div class="modal-overlay" id="modal">

    <!-- Full bleed photo -->

    <!-- Gradients -->

        <div class="sc-fact-label">🔥 Wild Fact</div>
        <div class="sc-fact-text" id="scFact"></div>

<canvas id="hiddenCanvas" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
var captured = null;
var stream = null;
var result = null;

function show(id) {
  ['camSection','loadSection','cardSection'].forEach(function(s){
    var el = document.getElementById(s);
    el.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(function(){ t.classList.remove('on'); }, ms||3000);
}

async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    var v = document.getElementById('videoEl');
    v.srcObject = stream; v.classList.add('on');
    document.getElementById('vfHint').style.display = 'none';
  } catch(e){}
}

document.getElementById('shutterBtn').onclick = function(){
  var v = document.getElementById('videoEl');
  if(!v.srcObject){ document.getElementById('fileIn').click(); return; }
  var c = document.getElementById('hiddenCanvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  captured = c.toDataURL('image/jpeg',0.85);
  showPreview(captured);
};

document.getElementById('fileIn').onchange = function(e){
  var f = e.target.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(ev){ captured = ev.target.result; showPreview(captured); };
  r.readAsDataURL(f);
};

function showPreview(src){
  var p = document.getElementById('previewEl');
  p.src = src; p.classList.add('on');
  document.getElementById('videoEl').classList.remove('on');
  document.getElementById('vfHint').style.display = 'none';
  document.getElementById('shutterBtn').style.display = 'none';
  document.querySelector('.icon-btn').style.display = 'none';
  document.getElementById('goBtn').classList.add('on');
  document.getElementById('retakeBtn').classList.add('on');
  document.getElementById('camHint').textContent = 'Tap "Identify This" to discover';
}

function retake(){
  captured = null;
  var p = document.getElementById('previewEl');
  p.classList.remove('on'); p.src = '';
  document.getElementById('shutterBtn').style.display = '';
  document.querySelector('.icon-btn').style.display = '';
  document.getElementById('goBtn').classList.remove('on');
  document.getElementById('retakeBtn').classList.remove('on');
  document.getElementById('camHint').textContent = 'Tap shutter or upload a photo';
  if(stream) document.getElementById('videoEl').classList.add('on');
  else document.getElementById('vfHint').style.display = '';
}

document.getElementById('retakeBtn').onclick = retake;
function newScan(){ retake(); show('camSection'); }

function compress(dataUrl, maxW, q){
  return new Promise(function(res){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas');
      var w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q));
    };
    img.src=dataUrl;
  });
}

document.getElementById('goBtn').onclick = async function(){
  if(!captured) return;
  show('loadSection');
  try {
    var comp = await compress(captured,768,0.7);
    var b64 = comp.split(',')[1];

    var resp = await fetch('https://nexusworker.robel-8cd.workers.dev/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
            {type:'text',text:'Identify this photo. Return ONLY raw JSON, no markdown, no backticks:\n{"name":"Full name","location":"City/place or empty","tag1":"Category: Landmark Nature Art Urban Animal Food Product","tag2":"one word tag","tag3":"year/era or empty","description":"Start with: This is [name]. Then 2-3 sentences of key facts.","trivia":"Start with Wild fact: or Did you know: — one jaw-dropping fact, 1-2 sentences."}'}
          ]
        }]
      })
    });

    if(!resp.ok){ var e=await resp.text(); throw new Error('API '+resp.status+': '+e.slice(0,80)); }

    var data = await resp.json();
    var raw = data.content.map(function(b){return b.text||'';}).join('');
    var m = raw.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('No JSON found');
    result = JSON.parse(m[0]);

    // Populate discovery card
    document.getElementById('cardImg').src = captured;
    document.getElementById('cardKicker').textContent = [result.tag1, result.location, result.tag3].filter(Boolean).join(' · ');
    document.getElementById('cardName').textContent = result.name || '';
    document.getElementById('cardLoc').textContent = result.location ? '📍 ' + result.location : '';
    document.getElementById('cardDesc').textContent = result.description || '';
    document.getElementById('cardFact').textContent = result.trivia || '';

    // Populate share card
    document.getElementById('shareImg').src = captured;
    document.getElementById('scTag').textContent = result.tag1 || 'Discovery';
    document.getElementById('scKicker').textContent = [result.tag1, result.location, result.tag3].filter(Boolean).join(' · ');
    document.getElementById('scName').textContent = result.name || '';
    document.getElementById('scLoc').textContent = result.location ? '📍 ' + result.location : '';
    document.getElementById('scDesc').textContent = result.description || '';
    document.getElementById('scFact').textContent = result.trivia || '';

    show('cardSection');

  } catch(err){
    show('camSection');
    toast('Error: '+err.message, 5000);
  }
};

function share(platform){
  var txt = (result?result.name:'') + '\n\n' + (result?result.description:'') + '\n\n' + (result?result.trivia:'') + '\n\n📍 Discovered on Nexus';
  if(navigator.share){ navigator.share({title:'Nexus Discovery',text:txt}).catch(function(){}); return; }
  if(platform==='twitter') window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank');
  else if(platform==='whatsapp') window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  else if(platform==='imessage') window.open('sms:&body='+encodeURIComponent(txt),'_blank');
  else if(platform==='facebook') window.open('https://www.facebook.com/sharer/sharer.php?quote='+encodeURIComponent(txt),'_blank');
  else { navigator.clipboard&&navigator.clipboard.writeText(txt); toast('Copied! Open '+platform+' and paste 🚀'); }
}

function openRepost(){ document.getElementById('modal').classList.add('on'); }
function closeRepost(){ document.getElementById('modal').classList.remove('on'); }

async function downloadCard(){
  toast('Saving...', 2000);
  try {
    var card = document.getElementById('shareCard');
    var canvas = await html2canvas(card,{backgroundColor:'#ffffff',scale:3,useCORS:true,logging:false});
    canvas.toBlob(async function(blob){
      var file = new File([blob],'nexus-card.png',{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Nexus Discovery'});
      } else {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'nexus-card.png';
        a.click();
        toast('Card saved! Post it to your story 🚀', 3500);
      }
    },'image/png');
  } catch(e){ toast('Error: '+e.message, 4000); }
}

startCam();
</script>
