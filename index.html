<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --gold: #C9A84C; --gold-light: #E8C97A; --black: #0a0a0a; --white: #ffffff; --grey6: #f5f5f7; --rule: #f0f0f0; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:#fff; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; color:#0a0a0a; -webkit-font-smoothing:antialiased; }

  .section { display:none; }

  /* ── CAMERA ── */
  #camSection { min-height:100vh; min-height:100dvh; display:none; flex-direction:column; background:#fff; }
  #camSection.active { display:flex; }

  .top-bar { padding:52px 24px 16px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; border-bottom:1px solid #f0f0f0; }
  .logo { font-size:16px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:#0a0a0a; }
  .logo span { color:#C9A84C; }
  .logo-sub { font-size:10px; font-weight:400; letter-spacing:0.12em; color:#bbb; text-transform:uppercase; }

  .vf-wrap { flex:1; padding:20px 20px 0; display:flex; align-items:center; justify-content:center; min-height:0; }
  .vf { width:100%; aspect-ratio:3/4; border-radius:20px; overflow:hidden; position:relative; background:#f5f5f7; border:1px solid #f0f0f0; }

  #videoEl { width:100%; height:100%; object-fit:cover; display:none; }
  #videoEl.on { display:block; }
  #previewEl { width:100%; height:100%; object-fit:cover; display:none; }
  #previewEl.on { display:block; }

  .vf-hint { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .vf-hint .ico { width:56px; height:56px; border-radius:16px; background:#fff; border:1px solid #f0f0f0; display:flex; align-items:center; justify-content:center; font-size:24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .vf-hint .txt { font-size:12px; font-weight:400; color:#bbb; text-align:center; line-height:1.6; }

  .corner { position:absolute; width:22px; height:22px; border-color:#C9A84C; border-style:solid; opacity:0.7; }
  .tl { top:14px; left:14px; border-width:2px 0 0 2px; border-radius:3px 0 0 0; }
  .tr { top:14px; right:14px; border-width:2px 2px 0 0; border-radius:0 3px 0 0; }
  .bl { bottom:14px; left:14px; border-width:0 0 2px 2px; border-radius:0 0 0 3px; }
  .br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 3px 0; }
  .scan { position:absolute; left:14px; right:14px; height:1px; background:linear-gradient(to right,transparent,#C9A84C,transparent); opacity:0.5; animation:scan 3s ease-in-out infinite; }
  @keyframes scan { 0%{top:14px;opacity:0} 10%{opacity:0.5} 90%{opacity:0.5} 100%{top:calc(100% - 14px);opacity:0} }
  @keyframes tapPulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.6);opacity:0} }

  .cam-controls { padding:20px 28px 48px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }

  .icon-btn { width:52px; height:52px; border-radius:50%; background:#fff; border:1px solid #f0f0f0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .icon-btn svg { width:20px; height:20px; opacity:0.5; }
  .icon-btn:active { background:#f5f5f7; transform:scale(0.93); }

  .shutter { width:76px; height:76px; border-radius:50%; background:#0a0a0a; border:none; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  .shutter::after { content:''; width:58px; height:58px; border-radius:50%; background:#0a0a0a; border:2px solid rgba(255,255,255,0.15); }
  .shutter:active { transform:scale(0.93); }

  .go-btn { width:76px; height:76px; border-radius:50%; background:#C9A84C; border:none; font-size:10px; font-weight:700; letter-spacing:0.05em; color:#0a0a0a; text-align:center; line-height:1.2; text-transform:uppercase; cursor:pointer; flex-shrink:0; display:none; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(201,168,76,0.35); }
  .go-btn.on { display:flex; }
  .go-btn:active { transform:scale(0.93); }

  .retake-btn { display:none; }
  .retake-btn.on { display:flex; }

  .cam-hint { font-size:11px; font-weight:400; letter-spacing:0.06em; color:#ccc; text-align:center; padding-bottom:8px; flex-shrink:0; text-transform:uppercase; }

  /* ── LOADING ── */
  #loadSection { min-height:100vh; min-height:100dvh; display:none; flex-direction:column; align-items:center; justify-content:center; gap:28px; background:#fff; }
  #loadSection.active { display:flex; }
  .load-logo { font-size:16px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:#f0f0f0; }
  .load-logo span { color:#C9A84C; }
  .rings { position:relative; display:flex; align-items:center; justify-content:center; }
  .ring { width:72px; height:72px; border-radius:50%; border:2px solid #C9A84C; animation:ripple 1.5s ease-out infinite; }
  .ring2 { position:absolute; width:72px; height:72px; border-radius:50%; border:2px solid #C9A84C; animation:ripple 1.5s ease-out 0.6s infinite; opacity:0.3; }
  @keyframes ripple { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(1.9);opacity:0} }
  .load-txt { font-size:11px; font-weight:500; letter-spacing:0.14em; color:#ccc; text-transform:uppercase; animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── CARD SCREEN ── */
  #cardSection { display:none; overflow-y:scroll; -webkit-overflow-scrolling:touch; min-height:100vh; min-height:100dvh; background:#f5f5f7; padding:0 0 80px; }
  #cardSection.active { display:block; }

  .card-screen-header { padding:52px 24px 16px; display:flex; justify-content:space-between; align-items:center; background:#fff; border-bottom:1px solid #f0f0f0; position:sticky; top:0; z-index:10; }
  .new-scan-pill { font-size:11px; font-weight:600; letter-spacing:0.04em; color:#0a0a0a; background:#fff; border:1px solid #f0f0f0; padding:8px 16px; border-radius:20px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.05); }

  .card { margin:20px 16px 0; border-radius:20px; overflow:hidden; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.06),0 20px 48px rgba(0,0,0,0.08); }

  .card-photo { width:100%; background:#f5f5f7; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; min-height:200px; }
  .card-photo img { width:100%; height:auto; display:block; max-height:380px; object-fit:contain; }

  .gold-line { height:3px; background:linear-gradient(to right,#C9A84C,#E8C97A,#C9A84C); }
  .card-body { padding:20px 22px 0; }
  .card-kicker { font-family:'DM Mono',monospace; font-size:10px; font-weight:600; letter-spacing:0.14em; color:#C9A84C; text-transform:uppercase; margin-bottom:8px; }
  .card-name { font-size:28px; font-weight:800; color:#0a0a0a; line-height:1.08; letter-spacing:-0.8px; margin-bottom:6px; }
  .card-loc { font-size:11px; color:#bbb; margin-bottom:18px; }
  .card-rule { height:1px; background:#f0f0f0; margin-bottom:18px; }
  .card-desc { font-size:15px; color:#333; line-height:1.74; letter-spacing:-0.1px; margin-bottom:20px; }
  .fact-box { background:#0a0a0a; border-radius:14px; padding:16px 18px; margin-bottom:24px; }
  .fact-label { font-family:'DM Mono',monospace; font-size:9px; font-weight:600; letter-spacing:0.16em; color:#C9A84C; text-transform:uppercase; margin-bottom:8px; }
  .fact-text { font-size:14px; color:#888; line-height:1.7; letter-spacing:-0.1px; }

  .share-wrap { padding:16px 22px 20px; border-top:1px solid #f0f0f0; }
  .share-lbl { font-size:9px; font-weight:600; letter-spacing:0.12em; color:#ccc; text-transform:uppercase; margin-bottom:14px; text-align:center; }
  .share-row { display:flex; justify-content:space-between; align-items:center; }
  .sico { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex:1; transition:transform 0.15s; }
  .sico:active { transform:scale(0.85); opacity:0.7; }
  .sico-ring { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
  .sico-name { font-size:7px; font-weight:500; color:#bbb; text-transform:uppercase; letter-spacing:0.04em; }
  .sico svg { width:18px; height:18px; }
  .ig .sico-ring { background:radial-gradient(circle at 30% 110%,#f09433,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888); }
  .tk .sico-ring { background:#010101; }
  .wa .sico-ring { background:#25D366; }
  .im .sico-ring { background:linear-gradient(135deg,#29CC52,#1eaa3f); }
  .tw .sico-ring { background:#000; }
  .fb .sico-ring { background:#1877F2; }
  .sc .sico-ring { background:#FFFC00; }

  .card-footer { padding:14px 22px 18px; border-top:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; }
  .footer-brand { font-size:11px; font-weight:600; letter-spacing:0.1em; color:#e0e0e0; text-transform:uppercase; }
  .footer-dot { width:7px; height:7px; border-radius:50%; background:#C9A84C; }

  .repost-wrap { margin:16px 16px 0; }
  .repost-btn { width:100%; background:#0a0a0a; color:#fff; font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:16px; border-radius:14px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12); }
  .repost-btn:active { background:#333; }

  /* ── MODAL ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:100; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.on { display:flex; flex-direction:column; gap:14px; }

  /* Full bleed story card */
  .share-card { width:100%; max-width:340px; aspect-ratio:9/16; border-radius:20px; overflow:hidden; position:relative; background:#000; box-shadow:0 8px 32px rgba(0,0,0,0.4),0 32px 80px rgba(0,0,0,0.5); font-family:'Inter',-apple-system,sans-serif; }
  .sc-photo { position:absolute; inset:0; z-index:0; }
  .sc-photo img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }
  .sc-grad-top { position:absolute; top:0; left:0; right:0; height:100px; background:linear-gradient(to bottom,rgba(0,0,0,0.45),transparent); z-index:1; }
  .sc-grad-bottom { position:absolute; bottom:0; left:0; right:0; height:72%; background:linear-gradient(to top,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.88) 30%,rgba(0,0,0,0.6) 55%,transparent 100%); z-index:1; }
  .sc-corner { position:absolute; width:16px; height:16px; border-color:rgba(201,168,76,0.65); border-style:solid; z-index:3; }
  .sc-tl { top:48px; left:14px; border-width:2px 0 0 2px; border-radius:2px 0 0 0; }
  .sc-tr { top:48px; right:14px; border-width:2px 2px 0 0; border-radius:0 2px 0 0; }
  .sc-logo { position:absolute; top:16px; left:18px; z-index:4; font-size:11px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:#fff; }
  .sc-logo span { color:#C9A84C; }
  .sc-body { position:absolute; bottom:0; left:0; right:0; padding:0 18px 22px; z-index:5; }
  .sc-kicker { font-family:'DM Mono',monospace; font-size:8px; font-weight:600; letter-spacing:0.16em; color:#C9A84C; text-transform:uppercase; margin-bottom:5px; display:flex; align-items:center; gap:7px; }
  .sc-kicker-line { width:14px; height:1.5px; background:#C9A84C; border-radius:2px; flex-shrink:0; }
  .sc-name { font-size:26px; font-weight:900; color:#fff; line-height:1.05; letter-spacing:-0.7px; margin-bottom:3px; text-shadow:0 2px 16px rgba(0,0,0,0.6); }
  .sc-loc { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:11px; }
  .sc-gold-line { height:1.5px; background:linear-gradient(to right,#C9A84C,rgba(201,168,76,0.1)); margin-bottom:11px; }
  .sc-desc { font-size:11px; color:rgba(255,255,255,0.68); line-height:1.65; letter-spacing:-0.1px; margin-bottom:10px; }
  .sc-fact-box { background:rgba(8,8,8,0.8); border:1px solid rgba(201,168,76,0.2); border-radius:11px; padding:10px 13px; margin-bottom:13px; }
  .sc-fact-label { font-family:'DM Mono',monospace; font-size:7.5px; font-weight:600; letter-spacing:0.16em; color:#C9A84C; text-transform:uppercase; margin-bottom:4px; }
  .sc-fact-text { font-size:10.5px; color:rgba(255,255,255,0.62); line-height:1.65; letter-spacing:-0.1px; }
  .sc-footer { display:flex; align-items:center; gap:6px; }
  .sc-footer-brand { font-size:10px; font-weight:700; letter-spacing:0.1em; color:rgba(255,255,255,0.22); text-transform:uppercase; }
  .sc-footer-dot { width:5px; height:5px; border-radius:50%; background:#C9A84C; }

  .modal-actions { display:flex; gap:10px; width:100%; max-width:340px; }
  .dl-btn { flex:1; background:#0a0a0a; color:#fff; font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:14px; border-radius:12px; border:none; cursor:pointer; }
  .close-btn { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; padding:14px 18px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); cursor:pointer; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:#0a0a0a; color:#aaa; font-size:11px; font-weight:500; letter-spacing:0.06em; padding:12px 22px; border-radius:20px; opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; z-index:999; max-width:88vw; text-align:center; }
  .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- CAMERA -->
<div id="camSection" class="active">
  <div class="top-bar">
    <div class="logo">NEX<span>US</span></div>
    <div id="locPill" style="display:none; align-items:center; gap:5px; background:#f5f5f7; border:1px solid #f0f0f0; padding:5px 10px; border-radius:20px;">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#C9A84C"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z"/></svg>
      <span style="font-size:9px; font-weight:500; letter-spacing:0.04em; color:#999; text-transform:uppercase; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Location on</span>
    </div>
    <div class="logo-sub">Point & Discover</div>
  </div>
  <div class="vf-wrap">
    <div class="vf">
      <video id="videoEl" autoplay playsinline muted></video>
      <img id="previewEl" alt="">
      <div id="tapMarker" style="display:none; position:absolute; width:64px; height:64px; border:2.5px solid #C9A84C; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); box-shadow:0 0 0 4px rgba(201,168,76,0.15), 0 2px 12px rgba(0,0,0,0.3); z-index:5;">
        <div style="position:absolute; inset:-2.5px; border:2.5px solid #C9A84C; border-radius:50%; animation:tapPulse 1.2s ease-out infinite;"></div>
      </div>
      <div id="tapHint" style="display:none; position:absolute; bottom:10px; left:0; right:0; text-align:center; z-index:5;">
        <span style="font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; color:#fff; background:rgba(0,0,0,0.55); padding:6px 12px; border-radius:20px; text-transform:uppercase;">Tap exactly what you mean</span>
      </div>
      <div class="vf-hint" id="vfHint">
        <div class="ico">📷</div>
        <div class="txt">Point at any building,<br>object or landmark</div>
      </div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan"></div>
    </div>
  </div>
  <div class="cam-controls">
    <label class="icon-btn" id="uploadLabel">
      <input type="file" accept="image/*" id="fileIn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </label>
    <div class="shutter" id="shutterBtn"></div>
    <button class="go-btn" id="goBtn">Identify<br>This</button>
    <div class="icon-btn retake-btn" id="retakeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    </div>
  </div>
  <div class="cam-hint" id="camHint">Tap shutter or upload a photo</div>
</div>

<!-- LOADING -->
<div id="loadSection">
  <div class="load-logo">NEX<span>US</span></div>
  <div class="rings"><div class="ring"></div><div class="ring2"></div></div>
  <div class="load-txt">Identifying...</div>
</div>

<!-- CARD -->
<div id="cardSection">
  <div class="card-screen-header">
    <div class="logo">NEX<span style="color:#C9A84C">US</span></div>
    <button class="new-scan-pill" onclick="newScan()">⟳ New Scan</button>
  </div>
  <div class="card">
    <div class="card-photo"><img id="cardImg" alt=""></div>
    <div class="gold-line"></div>
    <div class="card-body">
      <div class="card-kicker" id="cardKicker"></div>
      <div class="card-name" id="cardName"></div>
      <div class="card-loc" id="cardLoc"></div>
      <div class="card-rule"></div>
      <div class="card-desc" id="cardDesc"></div>
      <div class="fact-box">
        <div class="fact-label">🔥 Wild Fact</div>
        <div class="fact-text" id="cardFact"></div>
      </div>
    </div>
    <div class="share-wrap">
      <div class="share-lbl">Share this find</div>
      <div class="share-row">

        <div class="sico sc" onclick="doShare('snapchat')"><div class="sico-ring"><svg viewBox="0 0 24 24" fill="black"><path d="M12.206.793c.99 0 4.347.276 5.93 3.821.529 1.193.403 3.219.317 4.814-.031.582-.081 1.192-.081 1.738.069.012 1.525.143 1.66.238a.883.883 0 01.397.747c-.07.372-.457.7-.945.754-.074.008-.547.038-.873.053-.055.013-.063.02-.063.049v.063c0 .088.014.19.042.304.098.402.285.977.744 1.604.459.629 1.217 1.264 2.449 1.736.243.094.479.175.711.241.253.073.43.235.503.446.07.218.021.467-.143.666a3.96 3.96 0 01-.548.537c-.231.189-.467.362-.709.524-.516.337-1.022.679-1.271 1.097-.281.471-.234.955-.217 1.33l.003.045c.033.478-.181.746-.496.838-.179.05-.429.057-.715.016-.537-.079-1.208-.293-1.804-.452-.374-.1-.699-.153-.987-.155a3.015 3.015 0 00-.697.071 9.33 9.33 0 00-.997.329c-.604.22-1.287.469-2.099.469-.744 0-1.44-.22-2.072-.432-.518-.175-.971-.337-1.347-.337-.317 0-.637.05-.985.153-.609.173-1.268.393-1.829.468a3.17 3.17 0 01-.431.029c-.315 0-.541-.067-.674-.199-.193-.188-.218-.489-.186-.876.025-.3.075-.699-.166-1.119-.231-.399-.74-.736-1.239-1.065a8.386 8.386 0 01-.724-.535 3.956 3.956 0 01-.548-.537c-.164-.199-.213-.448-.143-.666.073-.211.25-.373.503-.446.232-.066.468-.147.711-.241 1.232-.472 1.99-1.107 2.449-1.736.459-.627.646-1.202.744-1.604.028-.114.042-.216.042-.304v-.063c0-.029-.008-.036-.063-.049-.326-.015-.799-.045-.873-.053-.488-.054-.875-.382-.945-.754a.883.883 0 01.397-.747c.135-.095 1.591-.226 1.66-.238 0-.546-.05-1.156-.081-1.738-.086-1.595-.212-3.621.317-4.814C7.859 1.069 11.216.793 12.206.793z"/></svg></div><span class="sico-name">Snap</span></div>

<canvas id="hiddenCanvas" style="display:none"></canvas>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
var WORKER = 'https://nexusworker.robel-8cd.workers.dev/';
var captured = null;
var userLocation = null; // {lat, lng, label} once resolved
var locationStatus = 'idle'; // idle | requesting | granted | denied | unavailable

function getLocation() {
  if (locationStatus === 'granted' || locationStatus === 'requesting') return;
  if (!navigator.geolocation) { locationStatus = 'unavailable'; return; }

  locationStatus = 'requesting';
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      var label = '';
      try {
        var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=18&addressdetails=1', {
          headers: { 'Accept': 'application/json' }
        });
        var d = await r.json();
        var a = d.address || {};
        var parts = [a.house_number ? (a.house_number + ' ' + (a.road || '')) : a.road, a.neighbourhood || a.suburb, a.city || a.town, a.state].filter(Boolean);
        label = parts.join(', ') || d.display_name || '';
      } catch(e) {}
      userLocation = { lat: lat, lng: lng, label: label };
      locationStatus = 'granted';
      var pill = document.getElementById('locPill');
      if (pill) { pill.style.display = 'flex'; pill.querySelector('span').textContent = label || 'Location on'; }
    },
    function(err) {
      locationStatus = 'denied';
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 300000 }
  );
}
var stream = null;
var result = null;

function show(id) {
  ['camSection','loadSection','cardSection'].forEach(function(s){
    document.getElementById(s).classList.remove('active');
    document.getElementById(s).style.display = '';
  });
  var el = document.getElementById(id);
  el.classList.add('active');
  if (id === 'cardSection') { el.style.display = 'block'; }
  window.scrollTo(0, 0);
}

function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(function(){ t.classList.remove('on'); }, ms || 3000);
}

// Camera
async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    var v = document.getElementById('videoEl');
    v.srcObject = stream;
    v.classList.add('on');
    document.getElementById('vfHint').style.display = 'none';
  } catch(e) {}
}

document.getElementById('shutterBtn').onclick = function() {
  var v = document.getElementById('videoEl');
  if (!v.srcObject) { document.getElementById('fileIn').click(); return; }
  var c = document.getElementById('hiddenCanvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  captured = c.toDataURL('image/jpeg', 0.85);
  showPreview(captured);
};

document.getElementById('fileIn').onchange = function(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) { captured = ev.target.result; showPreview(captured); };
  r.readAsDataURL(f);
};

var tapPoint = null; // {xRatio, yRatio} normalized 0-1 relative to image

function showPreview(src) {
  var p = document.getElementById('previewEl');
  p.src = src; p.classList.add('on');
  document.getElementById('videoEl').classList.remove('on');
  document.getElementById('vfHint').style.display = 'none';
  document.getElementById('shutterBtn').style.display = 'none';
  document.getElementById('uploadLabel').style.display = 'none';
  document.getElementById('goBtn').classList.add('on');
  document.getElementById('retakeBtn').classList.add('on');
  document.getElementById('camHint').textContent = 'Tap exactly what you mean, then hit Identify';
  document.getElementById('tapHint').style.display = 'block';
  tapPoint = null;
  document.getElementById('tapMarker').style.display = 'none';
}

function retake() {
  captured = null;
  tapPoint = null;
  var p = document.getElementById('previewEl');
  p.classList.remove('on'); p.src = '';
  document.getElementById('shutterBtn').style.display = '';
  document.getElementById('uploadLabel').style.display = '';
  document.getElementById('goBtn').classList.remove('on');
  document.getElementById('retakeBtn').classList.remove('on');
  document.getElementById('camHint').textContent = 'Tap shutter or upload a photo';
  document.getElementById('tapHint').style.display = 'none';
  document.getElementById('tapMarker').style.display = 'none';
  if (stream) document.getElementById('videoEl').classList.add('on');
  else document.getElementById('vfHint').style.display = '';
}

document.getElementById('retakeBtn').onclick = retake;

// Tap-to-select: user taps the preview image to mark the exact subject
document.getElementById('previewEl').addEventListener('click', function(e) {
  if (!captured) return;
  var img = e.currentTarget;
  var rect = img.getBoundingClientRect();
  var xRatio = (e.clientX - rect.left) / rect.width;
  var yRatio = (e.clientY - rect.top) / rect.height;
  tapPoint = { x: xRatio, y: yRatio };

  var marker = document.getElementById('tapMarker');
  marker.style.left = (e.clientX - rect.left) + 'px';
  marker.style.top = (e.clientY - rect.top) + 'px';
  marker.style.display = 'block';
  document.getElementById('camHint').textContent = 'Got it — tap "Identify This"';
});
function newScan() { retake(); show('camSection'); }

function compress(dataUrl, maxW, q) {
  return new Promise(function(res) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      var w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = dataUrl;
  });
}

// Crop a focused region around the tapped point so Claude only sees what the user meant.
// Uses a window sized at ~55% of the shorter image dimension, centered on the tap, clamped to image bounds.
function cropToTapPoint(dataUrl, point) {
  return new Promise(function(res) {
    var img = new Image();
    img.onload = function() {
      var iw = img.width, ih = img.height;
      var windowSize = Math.round(Math.min(iw, ih) * 0.55);

      var cx = point.x * iw;
      var cy = point.y * ih;

      var sx = Math.max(0, Math.min(iw - windowSize, cx - windowSize / 2));
      var sy = Math.max(0, Math.min(ih - windowSize, cy - windowSize / 2));

      var c = document.createElement('canvas');
      c.width = windowSize; c.height = windowSize;
      c.getContext('2d').drawImage(img, sx, sy, windowSize, windowSize, 0, 0, windowSize, windowSize);
      res(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

document.getElementById('goBtn').onclick = async function() {
  if (!captured) return;
  show('loadSection');
  try {
    var imageToSend = captured;
    var usedTap = false;

    if (tapPoint) {
      imageToSend = await cropToTapPoint(captured, tapPoint);
      usedTap = true;
    }

    var comp = await compress(imageToSend, 512, 0.6);
    var b64 = comp.split(',')[1];

    var promptText = usedTap
      ? 'The user tapped a specific spot in their photo to mark exactly what they want identified, and this image has been cropped tightly around that point. Identify the specific subject centered in this cropped image — be precise and specific (exact building name, exact product, etc), not a general scene description. Return ONLY raw JSON, no markdown, no backticks:\\n{"name":"Full name","location":"City/place or empty","tag1":"Category: Landmark Nature Art Urban Animal Food Product","tag2":"one word tag","tag3":"year/era or empty","description":"Start with: This is [name]. Then 2-3 sentences of key facts. If you are not fully certain of the exact identity, say so plainly instead of inventing details.","trivia":"Start with Wild fact: or Did you know: — one jaw-dropping fact, 1-2 sentences. Only include if you are confident it is accurate."}'
      : 'Identify the single most prominent, central, or closest subject in this photo. If multiple buildings, objects, or items are visible, focus only on the one that is largest in frame, most centered, or clearly the main focal point — not the general scene. Be specific (e.g. name the exact building, not "a city street"). If you are not fully certain of the exact identity, say so plainly instead of inventing details. Return ONLY raw JSON, no markdown, no backticks:\\n{"name":"Full name","location":"City/place or empty","tag1":"Category: Landmark Nature Art Urban Animal Food Product","tag2":"one word tag","tag3":"year/era or empty","description":"Start with: This is [name]. Then 2-3 sentences of key facts.","trivia":"Start with Wild fact: or Did you know: — one jaw-dropping fact, 1-2 sentences. Only include if you are confident it is accurate."}';

    if (userLocation && userLocation.label) {
      promptText = 'IMPORTANT CONTEXT: This photo was taken near "' + userLocation.label + '" (GPS: ' + userLocation.lat.toFixed(5) + ', ' + userLocation.lng.toFixed(5) + '). Use this real-world location to identify the EXACT specific building or place at or very near these coordinates — do not guess a famous landmark from a different location just because it looks similar. If the location strongly suggests a specific known building, prefer that over a generic guess. ' + promptText;
    }

    var payload = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: promptText }
        ]
      }]
    };

    var resp = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!resp.ok) { var e = await resp.text(); throw new Error('HTTP ' + resp.status + ': ' + e.slice(0, 100)); }

    var data = await resp.json();
    if (data.error) throw new Error(data.error);

    var raw = data.content.map(function(b) { return b.text || ''; }).join('');
    var m = raw.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('No JSON in response');
    result = JSON.parse(m[0]);

    // Discovery card
    document.getElementById('cardImg').src = captured;
    document.getElementById('cardKicker').textContent = [result.tag1, result.location, result.tag3].filter(Boolean).join(' · ');
    document.getElementById('cardName').textContent = result.name || '';
    document.getElementById('cardLoc').textContent = result.location ? '📍 ' + result.location : '';
    document.getElementById('cardDesc').textContent = result.description || '';
    document.getElementById('cardFact').textContent = result.trivia || '';

    // Repost card
    document.getElementById('shareImg').src = captured;
    document.getElementById('scKicker').textContent = [result.tag1, result.location, result.tag3].filter(Boolean).join(' · ');
    document.getElementById('scName').textContent = result.name || '';
    document.getElementById('scLoc').textContent = result.location ? '📍 ' + result.location : '';
    document.getElementById('scDesc').textContent = result.description || '';
    document.getElementById('scFact').textContent = result.trivia || '';

    show('cardSection');

  } catch(err) {
    show('camSection');
    toast('Error: ' + err.message, 5000);
  }
};

function doShare(platform) {
  var txt = (result ? result.name : '') + '\n\n' + (result ? result.description : '') + '\n\n' + (result ? result.trivia : '') + '\n\n📍 Discovered on Nexus';
  if (navigator.share) { navigator.share({ title: 'Nexus Discovery', text: txt }).catch(function(){}); return; }
  if (platform === 'twitter') window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(txt), '_blank');
  else if (platform === 'whatsapp') window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
  else if (platform === 'imessage') window.open('sms:&body=' + encodeURIComponent(txt), '_blank');
  else if (platform === 'facebook') window.open('https://www.facebook.com/sharer/sharer.php?quote=' + encodeURIComponent(txt), '_blank');
  else { navigator.clipboard && navigator.clipboard.writeText(txt); toast('Copied! Open ' + platform + ' and paste 🚀'); }
}

function openRepost() { document.getElementById('modal').classList.add('on'); }
function closeRepost() { document.getElementById('modal').classList.remove('on'); }

async function downloadCard() {
  toast('Saving...', 2000);
  try {
    var card = document.getElementById('shareCard');
    var canvas = await html2canvas(card, { backgroundColor: '#000000', scale: 3, useCORS: true, logging: false });
    canvas.toBlob(async function(blob) {
      var file = new File([blob], 'nexus-card.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Nexus Discovery' });
      } else {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'nexus-card.png';
        a.click();
        toast('Card saved! Post it as a story 🚀', 3500);
      }
    }, 'image/png');
  } catch(e) { toast('Error: ' + e.message, 4000); }
}

startCam();
getLocation();
</script>
